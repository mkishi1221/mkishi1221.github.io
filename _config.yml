#-------------------------------
# General Site Settings
title: Masayuki Kishi
logo: # You can add own logo. For example '/images/logo.png'.
description:  Personal website of Masayuki Kishi, Product-first CTO for startups. I enable founders to build the business.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://masayukikishi.com" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# Author Settings
author:
  name: Masayuki Kishi
  bio: "Product-first CTO for startups. I enable founders to build the business. Product strategy, design, full stack build, and compliance."
  avatar: '/images/ZGP_8188_xs_square.jpg'

social:
- {icon: "ion-logo-github", label: Github, link: "https://github.com/mkishi1221"}
- {icon: "ion-logo-linkedin", label: LinkedIn, link: "https://www.linkedin.com/in/mkishi/"}

# Example of adding a new link to the author section and footer - {icon: "ion-logo-github", label: Github, link: "https://github.com"}
# Other icons can be found at https://ionicons.com/v4/

#-------------------------------
# Hero Settings
hero:
  hero__title: Hey, I'm Masa! 👋 Product-first CTO for startups.
  hero__description: I enable founders to build the business. Product strategy, design, full stack build, and compliance. <strong><em>First users active in months, not years.</em></strong>
  hero__image: '/images/ZGP_8199_xs.jpg'


#-------------------------------
# Newsletter (_includes/footer-widgets/widget-subscribe.html)
mailchimp: false # To enable the mailchimp form, use the value 'true'. To disable the form, use the value 'false' or leave the field blank.
mailchimp__title: Stay in the loop # Add your Title
mailchimp__text: Occasional posts on building products and shipping fast. # Add your description.
mailchimp__identifier: https://masayukikishi.us2.list-manage.com/subscribe/post?u=911b3c9384e1f6c3d4bf9d029&amp;id=33723eec57&amp;f_id=009bc0e1f0 # Add your MailChimp form identifier. For example - blogenjoyfreedom.us16.list-manage.com/subscribe/post?u=cd56155d76ddeeb4c0bc4d080&amp;id=7a526cd13e
mailchimp__button__text: Join # Add your button text


#-------------------------------
# Contact Settings
contact:
  description: I take on fractional CTO engagements and fixed-price product builds. If you're a founder who needs a product built properly and quickly, let's talk. # Add a description of your form

# NOTE
# Joseph comes with a built-in contact form, that you can use with Formspree service to handle up to 50 submissions per month for free. You could also easily switch to another contact form service if you want.


#-------------------------------
# Comment Section (Disqus)
disqus-identifier: anvodstudio-demo # add your shortname for Disqus Comment. For example anvodstudio-demo


#-------------------------------
# Google Analytics
google-analytics: G-CHSTZW4DL6 # Add your identifier. For example G-XXXXXXXXXX for GA4 or UA-99631805-1 for Universal Analytics


#-------------------------------
# Build Settings
markdown: kramdown
permalink: /:title
future: true
plugins:
  - jekyll-sitemap
  - jekyll-paginate

paginate: 5
paginate_path: "blog/index.html"

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext
  - scope:
      path: '_projects'
    values:
      permalink: /:basename:output_ext

include:
  - _pages
  - _projects

sass:
  sass_dir: _sass
  style: compressed